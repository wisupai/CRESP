# rustfmt configuration for CRESP project
# See https://rust-lang.github.io/rustfmt/ for documentation

# Use max line width of 100 characters
max_width = 100

# Indentation style (4 spaces)
tab_spaces = 4

# Code organization
reorder_imports = true
reorder_modules = true

# Edition
edition = "2021"

# Force Unix line endings
newline_style = "Unix" 