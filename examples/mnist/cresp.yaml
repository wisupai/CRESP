version: 0.1.0
metadata:
  title: MNIST Demo with CRESP
  authors:
  - name: Wisup AI Team
    affiliation: Wisup AI
    email: team@wisup.ai
  description: Minimal reproducible MNIST classification demo using CRESP
environment:
  manager: pixi
  file: pixi.toml
stages:
- id: prepare_data
  description: Download and prepare MNIST dataloaders
  dependencies: []
  outputs:
  - path: data
    shared: true
    reproduction:
      mode: strict
  code_handler: __main__.prepare_data
  parameters: {}
- id: train
  description: Train CNN on MNIST
  dependencies:
  - prepare_data
  outputs:
  - path: outputs/mnist_model.pt
    shared: false
    reproduction:
      mode: strict
  code_handler: __main__.train
  parameters: {}
- id: evaluate
  description: Evaluate model accuracy
  dependencies:
  - train
  outputs:
  - path: outputs/accuracy.json
    shared: false
    reproduction:
      mode: strict
  code_handler: __main__.evaluate
  parameters: {}
reproduction:
  random_seed: 42
