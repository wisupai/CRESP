name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'  # Matches both dev and stable versions

env:
  CARGO_TERM_COLOR: always
  RELEASE_BIN: cresp

jobs:
  build:
    name: Build Release Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: cresp-x86_64-linux-gnu.tar.gz
            cross: false
            
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: cresp-aarch64-linux-gnu.tar.gz
            cross: true
            
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            name: cresp-i686-linux-gnu.tar.gz
            cross: true
            
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: cresp-armv7-linux-gnueabihf.tar.gz
            cross: true
            
          # macOS builds
          - target: x86_64-apple-darwin
            os: macos-latest
            name: cresp-x86_64-darwin.tar.gz
            cross: false
            
          - target: aarch64-apple-darwin
            os: macos-latest
            name: cresp-aarch64-darwin.tar.gz
            cross: true
            
          # Windows builds
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: cresp-x86_64-windows-msvc.zip
            cross: false
            
          - target: i686-pc-windows-msvc
            os: windows-latest
            name: cresp-i686-windows-msvc.zip
            cross: true
            
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: cresp-aarch64-windows-msvc.zip
            cross: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
        
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --verbose --release --target ${{ matrix.target }}

      - name: Run tests
        if: "!matrix.cross"  # Only run tests on native platforms
        run: cargo test --verbose --release --target ${{ matrix.target }}

      - name: Prepare release archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../${{ matrix.name }} ${{ env.RELEASE_BIN }}
          cd -

      - name: Prepare release archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }} ${{ env.RELEASE_BIN }}.exe
          cd -

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version type
        id: version_type
        run: |
          # Get the current ref and branch
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          
          # Get branch for this tag
          BRANCH=$(git branch -r --contains $GITHUB_REF | grep -v HEAD | head -n 1 | sed 's/.*\///' | xargs)
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          
          if [[ "$BRANCH" == "main" ]]; then
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            echo "RELEASE_TYPE=stable" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            echo "RELEASE_TYPE=development" >> $GITHUB_ENV
          fi
          
          echo "Branch: $BRANCH, Release type: $RELEASE_TYPE"

      - name: Generate release notes
        id: release_notes
        run: |
          echo "NOTES<<EOF" >> $GITHUB_ENV
          sed -n "/## \[${{ env.VERSION }}/,/## \[/p" CHANGELOG.md | sed '$ d' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ env.RELEASE_TYPE == 'stable' && 'Release' || 'Development Release' }} ${{ env.VERSION }}
          body: ${{ env.NOTES }}
          files: |
            cresp-x86_64-linux-gnu.tar.gz
            cresp-aarch64-linux-gnu.tar.gz
            cresp-i686-linux-gnu.tar.gz
            cresp-armv7-linux-gnueabihf.tar.gz
            cresp-x86_64-darwin.tar.gz
            cresp-aarch64-darwin.tar.gz
            cresp-x86_64-windows-msvc.zip
            cresp-i686-windows-msvc.zip
            cresp-aarch64-windows-msvc.zip
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        if: env.RELEASE_TYPE == 'stable'
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        if: env.RELEASE_TYPE == 'stable'
        run: cargo publish --token ${CRATES_TOKEN}
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_IO_TOKEN }} 