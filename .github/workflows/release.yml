name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'  # Matches both dev and stable versions

env:
  CARGO_TERM_COLOR: always
  RELEASE_BIN: cresp

jobs:
  # Build for Linux (x86_64)
  build-linux:
    name: Build for Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Prepare archive
        run: |
          cd target/release
          tar czvf ../../cresp-x86_64-linux-gnu.tar.gz ${{ env.RELEASE_BIN }}
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: cresp-x86_64-linux-gnu.tar.gz
          path: cresp-x86_64-linux-gnu.tar.gz

  # Build for macOS (Intel)
  build-macos-intel:
    name: Build for macOS (Intel)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build for Intel
        run: cargo build --release --target x86_64-apple-darwin

      - name: Run tests
        run: cargo test --release --target x86_64-apple-darwin

      - name: Prepare archive
        run: |
          cd target/x86_64-apple-darwin/release
          tar czvf ../../../cresp-x86_64-darwin.tar.gz ${{ env.RELEASE_BIN }}
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: cresp-x86_64-darwin.tar.gz
          path: cresp-x86_64-darwin.tar.gz

  # Build for macOS (Apple Silicon)
  build-macos-apple-silicon:
    name: Build for macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build for Apple Silicon
        run: cargo build --release --target aarch64-apple-darwin

      - name: Prepare archive
        run: |
          cd target/aarch64-apple-darwin/release
          tar czvf ../../../cresp-aarch64-darwin.tar.gz ${{ env.RELEASE_BIN }}
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: cresp-aarch64-darwin.tar.gz
          path: cresp-aarch64-darwin.tar.gz

  # Build for Windows (x86_64)
  build-windows:
    name: Build for Windows (x86_64)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Prepare archive
        shell: pwsh
        run: |
          Compress-Archive -Path "target\release\${{ env.RELEASE_BIN }}.exe" -DestinationPath "cresp-x86_64-windows-msvc.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: cresp-x86_64-windows-msvc.zip
          path: cresp-x86_64-windows-msvc.zip

  # Create Release
  release:
    name: Create Release
    needs: [build-linux, build-macos-intel, build-macos-apple-silicon, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version type
        run: |
          # Get the current ref and branch
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          
          # Get branch for this tag
          BRANCH=$(git branch -r --contains $GITHUB_REF | grep -v HEAD | head -n 1 | sed 's/.*\///' | xargs)
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          
          if [[ "$BRANCH" == "main" ]]; then
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            echo "RELEASE_TYPE=stable" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            echo "RELEASE_TYPE=development" >> $GITHUB_ENV
          fi
          
          echo "Branch: $BRANCH, Release type: $RELEASE_TYPE"

      - name: Generate release notes
        run: |
          echo "NOTES<<EOF" >> $GITHUB_ENV
          sed -n "/## \[${{ env.VERSION }}/,/## \[/p" CHANGELOG.md | sed '$ d' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ env.RELEASE_TYPE == 'stable' && 'Release' || 'Development Release' }} ${{ env.VERSION }}
          body: ${{ env.NOTES }}
          files: |
            cresp-x86_64-linux-gnu.tar.gz
            cresp-x86_64-darwin.tar.gz
            cresp-aarch64-darwin.tar.gz
            cresp-x86_64-windows-msvc.zip
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        if: env.RELEASE_TYPE == 'stable'
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        if: env.RELEASE_TYPE == 'stable'
        run: cargo publish --token ${CRATES_TOKEN}
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_IO_TOKEN }} 